    <script>
      const papers = [
        {
          title: "Elevation-Dependent Vegetation Greening and Its Responses to Climate Changes in the South Slope of the Himalayas.",
          url: "https://doi.org/10.1029/2024GL113276",
          year: "2025",
          authors: "Mukhtar, H., Yang, Y., Xu, M., Wu, J., Abbas, S., Wei, D. & Zhao, W.",
          journal: "Geophysical Research Letters",
          volume: "52",
          pages: "e2024GL113276",
          abstract: "The South Slope of the Himalayas (SSH) is witnessing dynamic shifts in vegetation greenness driven by climatic conditions across elevation variability. Here, we analyzed greening patterns of natural vegetated surfaces along the elevational gradient and examined their connection to climate changes from 2000 to 2022. Over 50% area of SSH exhibited significant greening, with higher rates in Central Himalayas (CH) and Western Himalayas (WH) compared to Eastern Himalayas (EH). The relative change rate (RCR) showed a notable increasing vegetation greenness from ~2,600 to ~5,000 m, followed by a decreasing trend in all subregions. Results showed that air temperature promoted the vegetation greening significantly in the high mountains but caused heat stress in lowlands of CH and WH. Precipitation supported growth in the middle mountains across the region except EH, which faced waterlogging stress. These findings are valuable for understanding vegetation changes under future climate changes and advancing our knowledge of ecosystem responses.",
          keywords: ["Vegetation", "Himalayas", "Climate Change", "Greening", "Remote Sensing", "Elevation"],
          doi: "10.1029/2024GL113276",
          citations: 14,
          status: "Published",
        },
        {
          title: "Evolving Climatic Patterns and drought risks across Pakistan's Agro-Ecological Zones.",
          url: "https://doi.org/10.1007/s00704-025-05681-y",
          year: "2025",
          authors: "Usama, R. M., Abbas, S., Almazroui, M., Bilal, M. F. & Ali, A.",
          journal: "Theoretical and Applied Climatology",
          volume: "156",
          pages: "457",
          abstract: "Climate change is altering global weather systems, posing climatic challenges for Pakistan through shifting precipitation patterns and rising temperatures. This study examines spatiotemporal variations in climate change and drought patterns across Pakistan's Agro-Ecological Zones (AEZs) from 1991 to 2023. Using ECMWF atmospheric reanalysis of the global climate (ERA-5) reanalysis data, we analyze precipitation and air temperature anomalies for 2023 to assess climate variability in all AEZs. To capture the spatial trend and severity of drought, we utilize the Precipitation Condition Index (PCI) and Air Temperature Condition Index (ATCI). Additionally, the Standardized Precipitation Index (SPI) is applied to evaluate long-term drought trends. Drought intensity has escalated, particularly in Punjab's agricultural heartlands, AEZ of Northern irrigated plain, threatening crop productivity and food security. From 1991 to 2020, droughts were concentrated in Sindh and Baluchistan's Dry Plateau, Coastal Zone, and Southern Irrigated Plains. By 2021–2023, droughts expanded from North of Sindh to South of Punjab and Northern irrigated plains. Precipitation deficits were observed in February (46.34 mm to 25.6 mm, a 44.7% drop) and August (81.66 mm to 29.78 mm, a 63.5% decline), related to critical stages of crop development, marking some of the driest conditions recorded since 1991. Conversely, temperature anomalies revealed marked warming trends, with February temperatures rising from 8.11 °C to 10.8 °C (+2.7 °C) and March from 13 °C to 13.5 °C (+0.5 °C). September saw a rise from 22.6 °C to 23.9 °C (+1.3 °C), while increases were noted in October (17.9 °C to 18.4 °C), November (12 °C to 13 °C), and December (7.21 °C to 8.5 °C). This study also found that nearly all AEZs experienced drought in 2000–2005, 2010, 2018 and 2022. While all AEZs showed positive wet trend after 2022, except TM, RP and NDM AEZs are in dryness from 2018 and still continued after 2022. The 2022 floods, compounded by erratic droughts, devastated major crops like wheat, cotton, barley, and rice, exacerbating food insecurity. These findings underscore the urgent need for adaptive measures tailored to regional climatic conditions. Implementing high-precision climate monitoring systems and region-specific drought management strategies are essential to mitigating climate change's adverse effects on Pakistan's agricultural sustainability and environmental stability.",
          keywords: ["Adaptation", "Agro-Ecological Zones", "Climate Change", "Drought", "Food Security", "Pakistan", "Precipitation", "Temperature", "SPI", "ATCI", "PCI"],
          doi: "10.1007/s00704-025-05681-y",
          citations: 0,
          status: "Published",
        },
        {
          title: "Performance of NDVI and GOSIF in monitoring vegetation responses to rainfall in a desert ecosystem",
          url: "https://doi.org/10.1016/j.rsase.2025.101621",
          year: "2025",
          authors: "Manzoor, A. T., Habib, N. & Abbas, S.",
          journal: "Remote Sensing Applications: Society and Environment",
          volume: "39",
          pages: "101621",
          abstract: "Abstract to be added.",
          keywords: ["NDVI", "GOSIF", "Desert Ecosystems", "Drought Monitoring", "Rainfall", "Vegetation"],
          doi: "10.1016/j.rsase.2025.101621",
          citations: 3,
          status: "Published",
        },
      ];

        Publications.renderCitationsChart(document.getElementById("citationsChartContainer"), papers);
